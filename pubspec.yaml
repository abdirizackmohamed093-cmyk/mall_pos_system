name: mall_pos_system
description: "A professional commercial Point of Sale application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  drift: ^2.24.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0
  # Hardware printing & driver utilities
  esc_pos_utils_plus: ^2.0.3
  print_bluetooth_thermal: ^1.2.0
  # PDF receipt generation
  pdf: ^3.10.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.24.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true